<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Exam Allocation System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:url('/images/bg.jpg') no-repeat center center/cover;
        }

        .container{
            display:flex;
            gap:60px;
        }

        .login-box{
            width:350px;
            background:rgba(255,255,255,0.9);
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

    </style>

</head>

<body>

<div class="container">

    <!-- ADMIN LOGIN -->

    <div class="login-box">

        <h2>ADMIN LOGIN</h2>

        <form action="/adminLogin" method="post">

            <div class="form-group">
                <label>Username</label>
                <input type="text"
                       name="username"
                       placeholder="Enter Username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password"
                       name="password"
                       placeholder="Enter Password">
            </div>

            <button type="submit">Login</button>

        </form>

    </div>


    <!-- STUDENT LOGIN -->

    <div class="login-box">

        <h2>STUDENT LOGIN</h2>

        <form action="/studentLogin" method="post">

            <div class="form-group">
                <label>Hall Ticket No</label>
                <input type="text"
                       name="hallTicketNo"
                       placeholder="Enter Hall Ticket">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password"
                       name="password"
                       placeholder="Enter Password">
            </div>

            <button type="submit">Login</button>

        </form>

    </div>

</div>

</body>
</html>
