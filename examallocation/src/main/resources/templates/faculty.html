<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Faculty</title>
    <style>
        body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
        .top-bar { margin-bottom:20px; }
        button { padding:10px 20px; margin-right:10px; border:none; border-radius:5px; cursor:pointer; }
        input { padding:10px; margin:5px; }
        table { width:100%; border-collapse:collapse; margin-top:20px; }
        table, th, td { border:1px solid white; }
        th, td { padding:10px; text-align:center; }
        .edit-input { padding:6px; width:120px; background:#1e293b; color:white; border:1px solid #60a5fa; border-radius:4px; }
        .error { background:#7f1d1d; color:#fca5a5; padding:10px 16px; border-radius:6px; margin-bottom:15px; font-size:14px; }
    </style>
</head>
<body>

<h1>Faculty Management</h1>

<div class="error" th:if="${error}" th:text="${error}"></div>

<div class="top-bar">
    <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchTable()" />
</div>

<form th:action="@{/faculty/add}" method="post">
    <input type="text" name="facultyName" placeholder="Faculty Name" required>
    <input type="text" name="department" placeholder="Department" required>
    <button type="submit">Save Faculty</button>
</form>

<table id="facultyTable">
    <thead>
    <tr>
        <th>ID</th>
        <th>Faculty Name</th>
        <th>Department</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="f : ${faculty}">

        <th:block th:if="${f.id != editFaculty?.id}">
            <td th:text="${f.id}"></td>
            <td th:text="${f.facultyName}"></td>
            <td th:text="${f.department}"></td>
            <td>
                <a th:href="@{/faculty/edit/{id}(id=${f.id})}">
                    <button>Edit</button>
                </a>
                <a th:href="@{/faculty/delete/{id}(id=${f.id})}"
                   onclick="return confirm('Delete?')">
                    <button>Delete</button>
                </a>
            </td>
        </th:block>

        <th:block th:if="${f.id == editFaculty?.id}">
            <td th:text="${f.id}"></td>
            <td><input class="edit-input" type="text" name="facultyName" th:value="${f.facultyName}" form="editForm" required /></td>
            <td><input class="edit-input" type="text" name="department" th:value="${f.department}" form="editForm" required /></td>
            <td>
                <button type="submit" form="editForm">Update</button>
                <a th:href="@{/faculty}"><button type="button">Cancel</button></a>
            </td>
        </th:block>

    </tr>
    </tbody>
</table>

<form id="editForm"
      th:action="@{/faculty/update}"
      method="post"
      th:if="${editFaculty != null}">
    <input type="hidden" name="id" th:value="${editFaculty?.id}" />
</form>

<script>
    function searchTable() {
        const input = document.getElementById('searchInput').value.toLowerCase();
        const rows = document.querySelectorAll('#facultyTable tbody tr');
        rows.forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(input) ? '' : 'none';
        });
    }
</script>

</body>
</html>
