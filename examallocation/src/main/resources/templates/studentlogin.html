<!DOCTYPE html>
<html>
<head>

    <title>Student Login</title>

    <style>

        body{

            margin:0;
            font-family:Arial;

            background-image:url("https://images.unsplash.com/photo-1523050854058-8df90110c9f1");
            background-size:cover;
        }

        .login-box{

            width:400px;
            margin:auto;
            margin-top:120px;

            background:white;

            padding:40px;

            border-radius:10px;
            text-align:center;
        }

        h2{
            margin-bottom:30px;
        }

        input{

            width:90%;
            padding:12px;

            margin-top:15px;

            border:1px solid gray;
            border-radius:5px;
        }

        button{

            margin-top:20px;

            padding:12px 25px;

            background:green;
            color:white;

            border:none;
            border-radius:5px;

            font-size:18px;
        }

    </style>

</head>

<body>

<div class="login-box">

    <h2>Student Login</h2>
    <p class="error" th:if="${error}" th:text="${error}"></p>

    <form action="/studentLogin" method="post">

        <input type="text" name="hallTicket" placeholder="Enter Roll Number" required>

        <br>

        <input type="password" name="password" placeholder="Enter Password" required>

        <br>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
